name: CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      # actions/checkout@v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      # gitleaks/gitleaks-action@v3
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Clone RFMS (shared types dependency)
        run: |
          git init ../RFMS
          git -C ../RFMS remote add origin https://github.com/Reedtrullz/RFMC.git
          git -C ../RFMS fetch --depth 1 origin 810fc9652da431eaf8978b85bf4af131605559b5
          git -C ../RFMS checkout --detach FETCH_HEAD
      # actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run check:deps
      - run: npm run check:release
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        env:
          RFS_COMMIT_SHA: ${{ github.sha }}
          RFS_IMAGE_REF: ghcr.io/reedtrullz/rfs:sha-${{ github.sha }}
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run test:visual

  docker-smoke:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # docker/build-push-action@v7
      - name: Build PR-safe Docker smoke image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: false
          load: true
          tags: rfs:pr-smoke-${{ github.sha }}
          build-args: |
            RFS_COMMIT_SHA=${{ github.sha }}
            RFS_IMAGE_REF=rfs:pr-smoke-${{ github.sha }}
            RFS_VERSION=${{ github.sha }}
      - name: Smoke nginx container and release metadata
        run: |
          set -eu
          docker rm -f rfs_pr_smoke 2>/dev/null || true
          docker run -d --name rfs_pr_smoke \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /var/cache/nginx:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=755 \
            --tmpfs /var/run:rw,noexec,nosuid,size=4m,uid=101,gid=101,mode=755 \
            --tmpfs /tmp:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=1777 \
            --pids-limit 128 \
            --user 101:101 \
            --memory 256m --cpus 1.0 \
            -p 127.0.0.1:3005:8080 \
            rfs:pr-smoke-${{ github.sha }}
          cleanup() {
            docker logs --tail=50 rfs_pr_smoke 2>/dev/null || true
            docker rm -f rfs_pr_smoke 2>/dev/null || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 20); do
            if curl -fsS http://localhost:3005/ > /dev/null; then
              break
            fi
            if [ "$attempt" = "20" ]; then
              echo "Docker smoke health check failed"
              exit 1
            fi
            sleep 1
          done
          curl -fsS http://localhost:3005/ > /dev/null
          curl -fsS http://localhost:3005/rfs-version.json | grep -F "${{ github.sha }}" > /dev/null

  publish:
    needs: [test, docker-smoke]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image-meta.outputs.image_ref }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      # actions/checkout@v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Clone RFMS (shared types dependency)
        run: |
          git init ../RFMS
          git -C ../RFMS remote add origin https://github.com/Reedtrullz/RFMC.git
          git -C ../RFMS fetch --depth 1 origin 810fc9652da431eaf8978b85bf4af131605559b5
          git -C ../RFMS checkout --detach FETCH_HEAD
      # actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Define immutable image ref
        id: image-meta
        run: echo "image_ref=ghcr.io/reedtrullz/rfs:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        # docker/login-action@v4
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        id: build
        # docker/build-push-action@v7
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: true
          tags: |
            ghcr.io/reedtrullz/rfs:latest
            ghcr.io/reedtrullz/rfs:sha-${{ github.sha }}
          build-args: |
            RFS_COMMIT_SHA=${{ github.sha }}
            RFS_IMAGE_REF=ghcr.io/reedtrullz/rfs:sha-${{ github.sha }}
            RFS_VERSION=${{ github.sha }}
            VITE_CESIUM_ION_TOKEN=${{ secrets.VITE_CESIUM_ION_TOKEN }}
          labels: |
            org.opencontainers.image.title=RFS
            org.opencontainers.image.description=Reidar Flight Simulator web app
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.sha }}

  deploy:
    needs: publish
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy to VPS
        # appleboy/ssh-action@v1
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: 198.23.137.16
          username: deploy
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -eu
            IMAGE_REF=ghcr.io/reedtrullz/rfs:sha-${{ github.sha }}
            EXPECTED_COMMIT=${{ github.sha }}
            EXPECTED_IMAGE_DIGEST=${{ needs.publish.outputs.image_digest }}
            VERSION_METADATA_DIR="${HOME}/rfs-release-metadata"
            mkdir -p "$VERSION_METADATA_DIR"
            VERSION_METADATA_PATH="$VERSION_METADATA_DIR/rfs-version-${EXPECTED_COMMIT}.json"
            if [ -z "$EXPECTED_IMAGE_DIGEST" ] || [ "$EXPECTED_IMAGE_DIGEST" = "unknown" ]; then
              echo "Publish job did not provide an immutable image digest"
              exit 1
            fi
            cat > "$VERSION_METADATA_PATH" <<EOF
            {
              "name": "rfs",
              "version": "$EXPECTED_COMMIT",
              "commit": "$EXPECTED_COMMIT",
              "imageRef": "$IMAGE_REF",
              "imageDigest": "$EXPECTED_IMAGE_DIGEST"
            }
            EOF
            PREVIOUS_IMAGE_ID="$(docker inspect -f '{{.Image}}' rfs 2>/dev/null || true)"
            PREVIOUS_IMAGE_REF="$(docker inspect -f '{{.Config.Image}}' rfs 2>/dev/null || true)"
            PREVIOUS_PUBLIC_VERSION_JSON="$(curl -fsS https://fly.reidar.tech/rfs-version.json 2>/dev/null || true)"
            PREVIOUS_PUBLIC_COMMIT="$(printf '%s\n' "$PREVIOUS_PUBLIC_VERSION_JSON" | sed -n 's/.*"commit"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
            PREVIOUS_VERSION_METADATA_PATH="$VERSION_METADATA_DIR/rfs-version-previous-${EXPECTED_COMMIT}.json"
            PREVIOUS_VERSION_MOUNT_ARGS=""
            if [ -n "$PREVIOUS_PUBLIC_VERSION_JSON" ]; then
              printf '%s\n' "$PREVIOUS_PUBLIC_VERSION_JSON" > "$PREVIOUS_VERSION_METADATA_PATH"
              PREVIOUS_VERSION_MOUNT_ARGS="-v $PREVIOUS_VERSION_METADATA_PATH:/usr/share/nginx/html/rfs-version.json:ro"
            fi
            PREVIOUS_IMAGE="$PREVIOUS_IMAGE_ID"
            if [ -z "$PREVIOUS_IMAGE" ] || [ "$PREVIOUS_IMAGE" = "<no value>" ]; then
              PREVIOUS_IMAGE="$PREVIOUS_IMAGE_REF"
            fi
            if [ "$PREVIOUS_IMAGE" = "<no value>" ]; then
              PREVIOUS_IMAGE=""
            fi

            rollback() {
              if [ -z "$PREVIOUS_IMAGE" ]; then
                echo "Rollback unavailable: no previous image was captured."
                return 1
              fi

              echo "Rolling back to previous image: $PREVIOUS_IMAGE (previous ref: $PREVIOUS_IMAGE_REF, previous public commit: ${PREVIOUS_PUBLIC_COMMIT:-unknown})"
              docker rm -f rfs 2>/dev/null || true
              if ! docker run -d --name rfs --restart unless-stopped \
                --read-only \
                --cap-drop ALL \
                --security-opt no-new-privileges \
                --tmpfs /var/cache/nginx:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=755 \
                --tmpfs /var/run:rw,noexec,nosuid,size=4m,uid=101,gid=101,mode=755 \
                --tmpfs /tmp:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=1777 \
                --pids-limit 128 \
                --user 101:101 \
                -p 127.0.0.1:3005:8080 \
                --memory 256m --cpus 1.0 \
                --log-driver json-file --log-opt max-size=10m --log-opt max-file=3 \
                $PREVIOUS_VERSION_MOUNT_ARGS \
                "$PREVIOUS_IMAGE"; then
                echo "Rollback container start failed!"
                return 1
              fi

              for attempt in $(seq 1 10); do
                if curl -fsS https://fly.reidar.tech/ > /dev/null; then
                  break
                fi
                if [ "$attempt" = "10" ]; then
                  echo "Rollback public health check failed!"
                  return 1
                fi
                sleep 3
              done

              if [ -n "$PREVIOUS_PUBLIC_COMMIT" ]; then
                if ! curl -fsS https://fly.reidar.tech/rfs-version.json | grep -F "$PREVIOUS_PUBLIC_COMMIT" > /dev/null; then
                  echo "Rollback public version check failed; expected previous commit $PREVIOUS_PUBLIC_COMMIT"
                  return 1
                fi
              else
                if ! curl -fsS https://fly.reidar.tech/rfs-version.json > /dev/null; then
                  echo "Rollback public version check failed; previous commit unknown"
                  return 1
                fi
              fi
            }

            docker pull "$IMAGE_REF"
            docker rm -f rfs_canary 2>/dev/null || true

            # Start canary on port 3004. Existing production stays up until canary passes.
            docker run -d --name rfs_canary \
              --read-only \
              --cap-drop ALL \
              --security-opt no-new-privileges \
              --tmpfs /var/cache/nginx:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=755 \
              --tmpfs /var/run:rw,noexec,nosuid,size=4m,uid=101,gid=101,mode=755 \
              --tmpfs /tmp:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=1777 \
              --pids-limit 128 \
              --user 101:101 \
              --memory 256m --cpus 1.0 \
              -p 127.0.0.1:3004:8080 \
              -v "$VERSION_METADATA_PATH:/usr/share/nginx/html/rfs-version.json:ro" \
              "$IMAGE_REF"

            # Canary health and version checks.
            for attempt in $(seq 1 10); do
              if curl -fsS http://localhost:3004/ > /dev/null; then
                break
              fi
              if [ "$attempt" = "10" ]; then
                echo "Canary health check failed!"
                docker logs --tail=50 rfs_canary
                docker rm -f rfs_canary
                exit 1
              fi
              sleep 3
            done
            if ! CANARY_VERSION_JSON="$(curl -fsS http://localhost:3004/rfs-version.json)" || \
              ! printf '%s\n' "$CANARY_VERSION_JSON" | grep -F "$EXPECTED_COMMIT" > /dev/null || \
              ! printf '%s\n' "$CANARY_VERSION_JSON" | grep -F "$EXPECTED_IMAGE_DIGEST" > /dev/null; then
              echo "Canary version check failed!"
              docker logs --tail=50 rfs_canary
              docker rm -f rfs_canary
              exit 1
            fi

            echo "Canary healthy, promoting immutable image $IMAGE_REF..."
            docker rm -f rfs 2>/dev/null || true
            if ! docker run -d --name rfs --restart unless-stopped \
              --read-only \
              --cap-drop ALL \
              --security-opt no-new-privileges \
              --tmpfs /var/cache/nginx:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=755 \
              --tmpfs /var/run:rw,noexec,nosuid,size=4m,uid=101,gid=101,mode=755 \
              --tmpfs /tmp:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=1777 \
              --pids-limit 128 \
              --user 101:101 \
              -p 127.0.0.1:3005:8080 \
              --memory 256m --cpus 1.0 \
              --log-driver json-file --log-opt max-size=10m --log-opt max-file=3 \
              -v "$VERSION_METADATA_PATH:/usr/share/nginx/html/rfs-version.json:ro" \
              "$IMAGE_REF"; then
              if ! rollback; then
                docker rm -f rfs_canary
                exit 1
              fi
              docker rm -f rfs_canary
              exit 1
            fi
            docker rm -f rfs_canary

            if ! curl -fsS https://fly.reidar.tech/ > /dev/null; then
              echo "Public post-promotion health check failed; rolling back."
              if ! rollback; then
                exit 1
              fi
              exit 1
            fi
            if ! PUBLIC_VERSION_JSON="$(curl -fsS https://fly.reidar.tech/rfs-version.json)" || \
              ! printf '%s\n' "$PUBLIC_VERSION_JSON" | grep -F "$EXPECTED_COMMIT" > /dev/null || \
              ! printf '%s\n' "$PUBLIC_VERSION_JSON" | grep -F "$EXPECTED_IMAGE_DIGEST" > /dev/null; then
              echo "Public post-promotion version check failed; rolling back."
              if ! rollback; then
                exit 1
              fi
              exit 1
            fi
            echo "Deployed $IMAGE_REF (${{ needs.publish.outputs.image_digest }}) successfully to https://fly.reidar.tech"
